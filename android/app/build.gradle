plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    // Klasör yapına (com.example...) göre güncellendi
    namespace = "com.example.dgs_exam_app"
    
    // shared_preferences paketinin istediği SDK 35 sürümüne yükseltildi
    compileSdk = 35 
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    defaultConfig {
        // Uygulama kimliği klasör yapısıyla uyumlu hale getirildi
        applicationId = "com.example.dgs_exam_app"
        minSdk = 21 
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        
        // Çoklu kütüphane desteği ve çökme önleyici aktif edildi
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
        }
    }
}

flutter {
    source = "../.."
}